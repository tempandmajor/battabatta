<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Your Battarbox verification code</title>
  </head>
  <body style="margin:0;background:#f4f4f4;color:#0a0a0a;font-family:Helvetica Neue,Helvetica,Arial,sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f4f4f4;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border:1px solid #e9e9e9;border-radius:8px;overflow:hidden;">
            <tr>
              <td style="padding:28px;">
                <div style="display:inline-block;background:#0a0a0a;color:#ffffff;border-radius:7px;padding:7px 8px;font-size:13px;font-weight:700;line-height:1;">BB</div>
                <h1 style="margin:22px 0 10px;font-size:28px;line-height:1.1;letter-spacing:0;">Verification code</h1>
                <p style="margin:0 0 18px;color:#3d3d3d;font-size:15px;line-height:1.6;">Use this code to verify your identity for Battarbox.</p>
                <p style="margin:0;background:#f4f4f4;border:1px solid #e9e9e9;border-radius:8px;padding:16px 18px;font-size:30px;font-weight:700;letter-spacing:0.16em;text-align:center;">{{ .Token }}</p>
                <p style="margin:18px 0 0;color:#6b6b6b;font-size:13px;line-height:1.6;">This code expires shortly. If you did not request it, you can ignore this email.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
