<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Confirm your new Battarbox email</title>
  </head>
  <body style="margin:0;background:#f4f4f4;color:#0a0a0a;font-family:Helvetica Neue,Helvetica,Arial,sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f4f4f4;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border:1px solid #e9e9e9;border-radius:8px;overflow:hidden;">
            <tr>
              <td style="padding:28px 28px 8px;">
                <div style="display:inline-block;background:#0a0a0a;color:#ffffff;border-radius:7px;padding:7px 8px;font-size:13px;font-weight:700;line-height:1;">BB</div>
                <h1 style="margin:22px 0 10px;font-size:28px;line-height:1.1;letter-spacing:0;">Confirm your new email</h1>
                <p style="margin:0;color:#3d3d3d;font-size:15px;line-height:1.6;">Confirm {{ .NewEmail }} as the new email address for your Battarbox account.</p>
              </td>
            </tr>
            <tr>
              <td style="padding:20px 28px 8px;">
                <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#0a0a0a;color:#ffffff;text-decoration:none;border-radius:999px;padding:13px 20px;font-size:14px;font-weight:700;">Confirm new email</a>
              </td>
            </tr>
            <tr>
              <td style="padding:18px 28px 28px;">
                <p style="margin:0;color:#6b6b6b;font-size:13px;line-height:1.6;">If you did not request this change, ignore this email and keep your current account email.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
